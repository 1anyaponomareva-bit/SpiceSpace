<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#F4F1EA" />
  <meta name="description" content="SpiceSpace — цели, план и прогресс." />
  <title>SpiceSpace</title>

  <meta name="spicespace-backend" content="" />
  <meta name="spicespace-bot-username" content="SpiceSpacebot" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="app" id="app">

  <div class="gate" id="gate" hidden>
    <div class="gate-card">
      <h1 class="gate-title">Открой через бота</h1>
      <p class="gate-text">Mini App работает из чата SpiceSpace — нажми кнопку меню у бота или команду /app.</p>
      <button type="button" class="btn btn--accent" id="gate-open-bot">Открыть чат</button>
    </div>
  </div>

  <main class="main" id="main" hidden>
    <div class="panels">

      <section class="panel panel--active" id="panel-goals" data-panel="goals">
        <header class="hero">
          <div class="hero-text">
            <p class="hero-greeting" id="greeting">Добрый день,</p>
            <h1 class="hero-name" id="user-name">—</h1>
          </div>
          <div class="hero-avatar" id="avatar" aria-hidden="true"></div>
        </header>

        <div class="card card--dark streak-card">
          <div class="streak-card__top">
            <span class="label">Серия дней</span>
            <span class="streak-card__num" id="streak-number">0</span>
          </div>
          <div class="streak-dots" id="streak-dots"></div>
        </div>

        <div class="goals-list" id="goals-list"></div>

        <button type="button" class="btn btn--primary btn--block" id="btn-mark-day">✓ Отметить день выполненным</button>
      </section>

      <section class="panel" id="panel-plan" data-panel="plan" hidden>
        <header class="plan-header">
          <p class="label">Главная цель</p>
          <h2 class="plan-goal" id="plan-main-goal">—</h2>
        </header>

        <div class="plan-days" id="plan-days"></div>

        <div class="card week-card">
          <div class="week-card__head">
            <span class="week-card__title" id="week-title">Эта неделя</span>
            <div class="week-nav">
              <button type="button" class="week-nav__btn" data-week-nav="-1" aria-label="Предыдущая неделя">‹</button>
              <button type="button" class="week-nav__btn" data-week-nav="1" aria-label="Следующая неделя">›</button>
            </div>
          </div>
          <div class="week-row" id="week-row"></div>
        </div>
      </section>

      <section class="panel panel--center" id="panel-bot" data-panel="bot" hidden>
        <div class="bot-panel">
          <h2 class="bot-panel__title">SpiceSpace</h2>
          <p class="bot-panel__text">Вопросы, онбординг и ежедневные напоминания — в чате с ботом.</p>
          <button type="button" class="btn btn--accent btn--block" id="btn-open-chat">Открыть чат со Спейс</button>
        </div>
      </section>

    </div>

    <nav class="tabbar" aria-label="Навигация">
      <button type="button" class="tabbar__item tabbar__item--active" data-tab="goals">
        <span class="tabbar__icon">🎯</span>
        <span class="tabbar__label">Цели</span>
      </button>
      <button type="button" class="tabbar__item" data-tab="plan">
        <span class="tabbar__icon">📅</span>
        <span class="tabbar__label">План</span>
      </button>
      <button type="button" class="tabbar__item" data-tab="bot">
        <span class="tabbar__icon">💬</span>
        <span class="tabbar__label">Бот</span>
      </button>
    </nav>
  </main>

</div>

<script src="./app.js" defer></script>
</body>
</html>
