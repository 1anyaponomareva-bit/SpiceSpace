<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#F5F4F0" />
  <title>SpiceSpace</title>

  <meta name="spicespace-backend" content="" />
  <meta name="spicespace-bot-username" content="SpiceSpacebot" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="app" id="app">

  <div class="gate" id="gate" hidden>
    <div class="gate-card">
      <h1 class="gate-title">Открой через бота</h1>
      <p class="gate-text">Mini App работает из чата SpiceSpace — нажми кнопку меню у бота или команду /app.</p>
      <button type="button" class="gate-btn" id="gate-open-bot">Открыть чат</button>
    </div>
  </div>

  <main class="screen" id="main" hidden>
    <header class="header">
      <div class="header-left">
        <p class="greeting" id="greeting">Добрый день,</p>
        <h1 class="user-name" id="user-name">—</h1>
      </div>
      <div class="avatar" id="avatar" aria-hidden="true"></div>
    </header>

    <section class="month-card">
      <p class="card-label card-label--light">
        <svg class="label-icon" width="10" height="10" viewBox="0 0 24 24" aria-hidden="true"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9"/></svg>
        Цель месяца
      </p>
      <p class="month-card__text" id="month-goal">—</p>
      <div class="month-card__stars" aria-hidden="true">★ ★ ★</div>
    </section>

    <section class="week-card">
      <div class="week-card__head">
        <p class="card-label">Цель этой недели</p>
        <span class="badge" id="week-badge">Неделя 1</span>
      </div>
      <p class="week-card__text" id="week-goal">—</p>
      <div class="week-card__progress">
        <div class="progress-bar">
          <div class="progress-fill" id="week-fill" style="width:0%"></div>
        </div>
        <span class="progress-pct" id="week-pct">0%</span>
      </div>
    </section>

    <section class="today-card">
      <div class="today-card__head">
        <p class="card-label">
          <svg class="label-icon label-icon--dark" width="10" height="10" viewBox="0 0 24 24" aria-hidden="true"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9"/></svg>
          Задачи на сегодня
        </p>
        <span class="badge badge--muted" id="today-date">—</span>
      </div>
      <div class="task-list" id="task-list"></div>
    </section>

    <section class="streak-card">
      <div class="streak-card__head">
        <p class="card-label">Серия дней</p>
        <span class="streak-count" id="streak-count">0 дней</span>
      </div>
      <div class="streak-dots" id="streak-dots"></div>
    </section>
  </main>

</div>

<script src="./app.js" defer></script>
</body>
</html>
